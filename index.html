<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="การ์ดวาเลนไทน์ออนไลน์ — เลือกเปิดการ์ดส่งมอบความรักให้คนพิเศษของคุณ 💕">

    <!-- Web App Capable (Clears console deprecation warning) -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f48fb1">

    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="💕 Happy Valentine's Day — เลือกเปิดการ์ดรัก">
    <meta property="og:description" content="เลือกเปิดการ์ดรักจากสำรับ 20 แบบ มอบให้คนพิเศษ 💕">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="th_TH">

    <title>💕 Happy Valentine's Day — เลือกเปิดการ์ดรัก</title>

    <!-- Favicon -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💕</text></svg>">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Nunito:ital,wght@0,200..900;1,200..900&family=Dancing+Script:wght@400;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="bg-hearts" id="bgHearts" aria-hidden="true"></div>

    <header class="page-header">
        <h1 lang="en">Happy Valentine's Day</h1>
        <p class="subtitle">เลือกการ์ดที่ใช่ ส่งให้คนที่ชอบ 💌</p>
    </header>

    <main class="card-container">

        <!-- Grid สำหรับแสดงสำรับการ์ดทั้ง 20 ใบ -->
        <div class="card-grid" id="cardGrid">
            <!-- 20 โครงการ์ดเปล่าเพื่อป้องกัน Cumulative Layout Shift (CLS) -->
            <div class="grid-card"></div>
            <div class="grid-card"></div>
            <div class="grid-card"></div>
            <div class="grid-card"></div>
            <div class="grid-card"></div>
            <div class="grid-card"></div>
            <div class="grid-card"></div>
            <div class="grid-card"></div>
            <div class="grid-card"></div>
            <div class="grid-card"></div>
            <div class="grid-card"></div>
            <div class="grid-card"></div>
            <div class="grid-card"></div>
            <div class="grid-card"></div>
            <div class="grid-card"></div>
            <div class="grid-card"></div>
            <div class="grid-card"></div>
            <div class="grid-card"></div>
            <div class="grid-card"></div>
            <div class="grid-card"></div>
        </div>

        <!-- ปุ่มควบคุมด้านล่าง -->
        <div class="btn-group">
            <button class="btn-valentine btn-shuffle" id="btnShuffle" aria-label="สลับและจัดการ์ดใหม่">
                <span class="btn-icon" aria-hidden="true">🔀</span>
                <span class="btn-text">สับไพ่ / จัดการ์ดใหม่</span>
            </button>
        </div>
    </main>

    <!-- หน้าต่าง Modal แสดงผลการเปิดการ์ดแบบ 3D ซูมเข้าหาหน้าจอ -->
    <div class="modal-overlay" id="cardModal" role="dialog" aria-modal="true" aria-hidden="true" tabindex="-1">
        <div class="modal-content">
            
            <!-- ปุ่มปิดการ์ดตรงมุมขวาบนของจอภาพ -->
            <button class="btn-close" id="btnCloseModal" aria-label="ปิดหน้าต่างการ์ด">&times;</button>

            <!-- โครงสร้างการ์ดที่สามารถหมุน 3D Flip ได้ -->
            <div class="modal-card-wrapper">
                <div class="modal-card" id="modalCard">
                    
                    <!-- ด้านหน้าการ์ด (ซองจดหมายปิดผนึก) -->
                    <div class="modal-card-front">
                        <div class="envelope-back-design"></div>
                        <div class="envelope-flap-top"></div>
                        
                        <!-- สติกเกอร์รูปหัวใจสำหรับคลิกเปิด -->
                        <div class="heart-sticker-modal" id="modalWaxSeal" role="button" aria-label="สติกเกอร์รูปหัวใจ แดงพาสเทล แตะเพื่อเปิดการ์ด" tabindex="0">
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <path d="M50 84 C50 84, 16 62, 16 40 C16 20, 32 10, 50 28 C68 10, 84 20, 84 40 C84 62, 50 84, 50 84 Z" class="sticker-heart" />
                            </svg>
                        </div>
                        <p class="modal-envelope-label" id="modalEnvelopeLabel" lang="en">For You</p>
                        <p class="modal-envelope-hint">แตะสติกเกอร์หัวใจเพื่อเปิด 💌</p>
                    </div>

                    <!-- ด้านหลังการ์ด (จดหมายรักคำทำนายด้านใน) -->
                    <div class="modal-card-back" id="modalCardBack">
                        <div class="card-inner">
                            <!-- อีโมจิด้านบน -->
                            <div class="card-emoji-top" id="modalCardEmojiTop" aria-hidden="true">🌹</div>
                            
                            <!-- หัวข้อการ์ด -->
                            <h2 class="card-title" id="modalCardTitle" lang="en">Happy Valentine's Day</h2>
                            
                            <!-- เส้นคั่นกลาง -->
                            <div class="card-divider" id="modalCardDivider" aria-hidden="true">💗</div>
                            
                            <!-- ข้อความจดหมายรัก -->
                            <p class="card-message" id="modalCardMessage">
                                สุขสันต์วันวาเลนไทน์นะ...
                            </p>
                            
                            <!-- ลายเซ็น -->
                            <p class="card-signature" id="modalCardSignature" lang="en">With Love ❤️</p>
                            
                            <!-- อีโมจิด้านล่าง -->
                            <div class="card-emoji-bottom" id="modalCardEmojiBottom" aria-hidden="true">
                                <span>🌸</span>
                                <span>💖</span>
                                <span>🌸</span>
                            </div>

                            <!-- ปุ่มคัดลอกลิงก์ส่งต่อการ์ดนี้ -->
                            <button class="btn-share-card" id="btnShareCard" aria-label="คัดลอกลิงก์เพื่อส่งต่อการ์ดรักนี้">
                                <span class="share-btn-text">คัดลอกลิงก์เพื่อส่งต่อการ์ดนี้ 🔗</span>
                            </button>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <div class="sparkle-container" id="sparkleContainer" aria-hidden="true"></div>
    
    <footer class="page-footer">
        <p>Made with ❤️ — Valentine's Day 2026</p>
        <p class="footer-hearts" aria-hidden="true">♥ ♥ ♥ ♥ ♥</p>
    </footer>

    <script src="script.js" defer></script>

</body>

</html>
